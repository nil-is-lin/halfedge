name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip actual publish)"
        required: false
        default: "true"

env:
  CARGO_TERM_COLOR: always

jobs:
  pre-publish-checks:
    name: Pre-publish checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --verbose
      - name: Verify package
        run: cargo package --no-verify --allow-dirty

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: pre-publish-checks
    # Skip publish on dry_run or on non-tagged workflow_dispatch
    if: ${{ github.event_name == 'push' || github.event.inputs.dry_run != 'true' }}
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --token "$CARGO_REGISTRY_TOKEN"

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## Release ${{ steps.version.outputs.VERSION }}

            halfedge 半边网格数据结构库 v${{ steps.version.outputs.VERSION }}。

            ### 模块

            - 遍历（traversal）、拓扑操作、几何（geometry）
            - 细分（Catmull-Clark / Loop / √3）、抽稀、参数化（Tutte / Harmonic / LSCM / MVC）
            - 测地线（Dijkstra / Heat Method）、变形（Laplacian / ARAP）
            - 布尔运算、三角化、BVH、OBJ I/O

            ### 安装

            ```sh
            cargo add halfedge@${{ steps.version.outputs.VERSION }}
            ```

            ### 文档

            - 设计文档：`docs/*.tex`（中文）
            - API 文档：https://docs.rs/halfedge
          draft: false
          prerelease: false
