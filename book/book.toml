[book]
title = "halfedge 教程"
authors = ["nil-is-lin"]
language = "zh-cn"
src = "src"

[output.html]
default-theme = "light"
git-repository-url = "https://github.com/nil-is-lin/halfedge"
edit-url-template = "https://github.com/nil-is-lin/halfedge/edit/main/book/src/{path}"

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
